    text-decoration: none;
}

/* FOOTER */
footer {
    background: #2d3436;
    color: white;
    text-align: center;
    padding: 15px;
}

/* HIDE */

    display: none;
}

<script>
function showAtelier(num) {
    let a1 = document.querySelectorAll(".atelier1");
    let a2 = document.querySelectorAll(".atelier2");

    if(num === 1){
        a1.forEach(el => el.classList.remove("hidden"));
        a2.forEach(el => el.classList.add("hidden"));
    } else {
        a2.forEach(el => el.classList.remove("hidden"));
        a1.forEach(el => el.classList.add("hidden"));
    }
}
</script>
