<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="bootstrap.min.css">

<style>
body{
  background-color: rgb(232, 215, 119);;
}

#container {
  max-width: 480px;
  margin: 20px auto;
  padding: 30px 25px;
  background-color: rgb(244, 231, 136);
  border-radius: 15px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
  animation: fadeInUp 1s ease-out;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes shine {
  to { left: 100%; }
}

#headerText {
  text-align: center;
  font-size: 24px;
  color: rgb(5, 5, 5);
  margin-bottom: 30px;
  position: relative;
  display: inline-block;
}

#headerText::after {
  content: "";
  position: absolute;
  bottom: -6px;
  left: 50%;
  width: 0;
  height: 3px;
  background-color:#6d2621;
  transform: translateX(-50%);
  transition: width 0.4s ease;
}

#headerText:hover::after {
  width: 60%;
}

#Name,
#Email,
#adress,
#tel,
#Message {
  width: 100%;
  border: 1px solid #6d2621;
  padding: 8px 10px;
  font-size: 14px;
  border-radius: 8px;
  background-color:rgb(61, 12, 8);
  color: white;
  transition: all 0.3s ease;
}

#Name::placeholder,
#Email::placeholder,
#adress::placeholder,
#tel::placeholder,
#Message::placeholder {
  color: #f5f0d0;
}

#Name:focus,
#Email:focus,
#adress:focus,
#tel:focus,
#Message:focus {
  outline: none;
  background-color: white;
  color: #6d2621;
  box-shadow: 0 0 10px rgba(109, 38, 33, 0.6);
  transform: scale(1.03);
}

#send {
  width: 100%;
  background-color: rgb(61, 12, 8);
  color: white;
  border: none;
  padding: 10px;
  font-size: 14px;
  border-radius: 8px;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

#send:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

#send::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 3px;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.7),
    transparent
  );
}

#send:hover::after {
  animation: shine 0.8s linear;
}

#footer {
  margin-top: 40px;
  font-size: 14px;
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

#ot, #st {
  font-weight: 800;
  border-left: 4px solid #6d2621;
  padding-left: 6px;
  margin-bottom: 10px;
}
i{
    font-size: 1.5em;
    color: rgb(235, 235, 146);
}
#sos button {
  background-color: #120d0d;
  border: none;
  color: white;
  width: 32px;
  height: 32px;
  margin-right: 8px;
  border-radius: 7px;
  transition: transform 0.3s ease;
}

#sos button:hover {
  transform: scale(1.2);
}
 #links{
        align-items: center;
        gap: 50px;
        margin-left: 15px;
       
      }

      .top{
        background-color: rgb(61, 12, 8);
      }
   #iconl{
  font-size: 1.5em;
 color:rgb(228, 209, 102) ;
  margin-left: 800px;
}
#icon{
    font-size: 1.5em;
}
</style>
</head>

<body>
    <section class="top">
         <div id="links" class="nav nav-tabs text-dark">
            <li class="nav-item"><a href="indexproject.html" class="nav-link text-dark"><i id="icon" class="bi bi-house-door"></i></a></li>
            <li class="nav-item"><a href="aboutus.html" class="nav-link text-dark"><i id="icon" class="bi bi-people"></i></a></li>
            <li class="nav-item"><a href="contactt.html" class="nav-link text-dark"><i id="icon" class="bi bi-chat-dots"></i></a></li>
            <li class="nav-item"><a href="books.html" class="nav-link text-dark"><i id="icon" class="bi bi-book"></i></a></li>
             <li class="nav-item"><a href="help.html" class="nav-link"><i id="iconl" class="bi bi-question"></i></a></li>
          </div>
    </section>

<section id="container">
  <h2 id="headerText">Contact us</h2>

  <form>
    <div class="row g-3">
      <div class="col-12 col-md-6">
        <input type="text" id="Name" placeholder="Name">
      </div>
      <div class="col-12 col-md-6">
        <input type="email" id="Email" placeholder="Email">
      </div>
      <div class="col-12">
        <input type="text" id="adress" placeholder="Address">
      </div>
      <div class="col-12">
        <input type="tel" id="tel" placeholder="Number">
      </div>
      <div class="col-12">
        <textarea id="Message" rows="4" placeholder="Any inquiries"></textarea>
      </div>
      <div class="col-12">
        <button type="submit" id="send">SEND MESSAGE</button>
      </div>
    </div>
  </form>

  <section id="footer" class="row mt-4">
    <div class="col-12 col-md-6">
      <div id="ot">Our Info</div>
      Adress: 123 Maple Street, Brookfield, NY 12504, USA<br>
      Email: Bibliora@gmail.com<br>
      Phone: +212700000000
    </div>
    <div class="col-12 col-md-6">
      <div id="st">Social Us</div>
      <div id="sos">
        <button><i class="bi bi-facebook"></i></button>
        <button><i class="bi bi-instagram"></i></button>
        <button><i class="bi bi-twitter"></i></button>
        <button><i class="bi bi-youtube"></i></button>
      </div>
    </div>
  </section>
</section>

</body>
</html>
