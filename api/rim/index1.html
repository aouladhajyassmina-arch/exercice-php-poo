<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <style>
            #div1{
                background-color: rgb(221, 78, 157);
                height: 500px;
                width: 50%;
                transition: transform 5s;
                margin: 200px;
            }
            #div1:hover{
                transform: translate(100px,200px,100px);
                transform: scale(2,0.8);
                transform: rotate(0.5turn);
                transform: skew(50deg,30deg);
                
            }
            body{
                background-color: black;
                perspective: 300px;
            }
        </style>
    </head>
   <body>
    <div id="div1">
        
    </div>
   </body> 
</html>
