<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet"    href="bootstrap.min.css">
 
   
 
  <style>
    body{
      background-color: rgb(225, 211, 133);
        width:100% ;
        justify-content: center;
    }
    #container {
      max-width: 800px;
      margin: 40px auto;
      font-family: Arial, sans-serif;
      color: #444;
    }
    #headerText {
      text-align: center;
      font-size: 24px;
      color: rgb(5, 5, 5);
      margin-bottom: 30px;
      border-right: 3px solid  #6d2621;
      display: inline-block;
      padding-right: 10px;
    }
    #Name,
    #Email,
    #adress,
    #tel,
    #Message {
      width: 100%;
      border: 1px solid #666;
      padding: 8px;
      margin-bottom: 15px;
      font-size: 14px;
      border-radius: 5px;
     background-color: #6d2621;

    }
    #adress,
    #Message {
      resize: vertical;
      color: black;
    }
    #send{
      background-color: #6d2621;
      color: white;
      border: none;
      padding: 10px 25px;
      font-size: 14px;
      letter-spacing: 0.5px;
      cursor: pointer;
      width: 50%;
      border-radius: 6px;
      text-align: center;
      display: block;
      text-align: center;
    }
    #send:hover {
      background-color: #0a0707;
    }
    #footer {
      margin-top: 60px;
      font-size: 14px;
      color: #666;
    }
    #footer hr {
      margin-bottom: 20px;
    }
    #ot {
      font-weight: 800;
      margin-bottom: 10px;
      margin-left: 3px;
      border-left:4px solid #6d2621;
       padding-left: 4px;
    }
    
    #od {
      line-height: 1.6;
    font-size: medium;
      color: #525150;
      padding: 10px;
    }
    #st {
      font-weight: 800;
      margin-bottom: 10px;
      padding-left: 4px;
      margin-left: 3px;
      border-left:4px solid #6d2621;
    }
    #sos button {
      background-color: #333;
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      margin-right: 8px;
      padding: 10px;
      border-radius: 7px;
    }
  </style>
</head>
<body>
  
  <section id="container">
    <div class="row justify-content-center">
      <div class="col-12 text-center">
        <h2 id="headerText">Contact us</h2>
      </div>
    </div>
    <form>
      <div class="row">
        <div class="col-12 col-md-6 mb-3">
          <input type="text" id="Name" placeholder="Name" />
        </div>
        <div class="col-12 col-md-6 mb-3">
          <input type="email" id="Email" placeholder="Email" />
        </div>
      </div>
      <div class="row">
        <div class="col-12 mb-3">
          <input type="text" id="adress" placeholder="Adress" />
        </div>
      </div>
      <div class="row">
        <div class="col-12 mb-3">
          <input type="tel" id="tel" placeholder="Number" />
        </div>
      </div>
      <div class="row">
        <div class="col-12 mb-3">
          <textarea id="Message" rows="5" placeholder="Any inquiries" maxlength="500"></textarea>
        </div>
      </div>
      <div class="row">
        <div class="col-12 col-md-4 offset-md-8">
          <button  type="submit" id="send">SEND MESSAGE</button>
        </div>
      </div>
    </form>

    <section id="footer" class="row mt-5">
      <div id="o" class="col-12 col-md-6">
        <div id="ot"><h4><b>Our Info</b></h4></div>
        <div id="od">
          Tanger,Ofppt,Ntic <br />
          Email: Bibliora@gmail.com <br />
          Phone: +212700000000
        </div>
      </div>
      <div id="social" class="col-12 col-md-6">
        <div id="st"><h4><b>Social Us</b></h4> </div>
        <div id="sos">
          <button aria-label="Facebook">f</button>
          <button aria-label="Twitter">t</button>
          <button aria-label="Google+">g+</button>
          <button aria-label="Dribbble">d</button>
        </div>
      </div>
    </section>
  </section>
</body>
</html>
